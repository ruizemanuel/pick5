name: Pick5 Cron Jobs

on:
  schedule:
    # Coach publishes picks
    - cron: "0 12 14 5 *"   # MW37 publish — 14 May 12:00 UTC
    - cron: "0 12 21 5 *"   # MW38 publish — 21 May 12:00 UTC
    # Coach reveals picks
    - cron: "0 23 18 5 *"   # MW37 reveal — 18 May 23:00 UTC
    - cron: "0 8 25 5 *"    # MW38 reveal — 25 May 08:00 UTC
    # Oracle finalize + retry
    - cron: "0 22 24 5 *"   # finalize MW38 — 24 May 22:00 UTC
    - cron: "0 12 25 5 *"   # retry MW38 — 25 May 12:00 UTC
    # Daily leaderboard
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint path to hit (e.g. /api/coach/publish-picks?mw=37). Defaults to /api/leaderboard/recompute.'
        required: false
        default: '/api/leaderboard/recompute'

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - name: Determine endpoint
        id: endpoint
        run: |
          URL="${{ github.event.inputs.endpoint }}"
          if [ -z "$URL" ]; then
            case "${{ github.event.schedule }}" in
              "0 12 14 5 *") URL="/api/coach/publish-picks?mw=37" ;;
              "0 12 21 5 *") URL="/api/coach/publish-picks?mw=38" ;;
              "0 23 18 5 *") URL="/api/coach/reveal?mw=37" ;;
              "0 8 25 5 *")  URL="/api/coach/reveal?mw=38" ;;
              "0 22 24 5 *") URL="/api/oracle/finalize-mw?mw=38" ;;
              "0 12 25 5 *") URL="/api/oracle/retry?mw=38" ;;
              "0 0 * * *")   URL="/api/leaderboard/recompute" ;;
              *)             URL="/api/leaderboard/recompute" ;;
            esac
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved endpoint: $URL"

      - name: Hit endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://pick5-beta.vercel.app${{ steps.endpoint.outputs.url }}"
